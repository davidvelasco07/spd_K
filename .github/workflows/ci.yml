# SPDX-License-Identifier: MIT
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential libopenmpi-dev openmpi-bin

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install numpy

      - name: Cache Kokkos FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: kokkos-5.1.1-${{ runner.os }}

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Unit tests (transforms)
        run: ./build/spd_K_test

      - name: Regression suite
        run: python tests/run_tests.py --build-dir build --skip-unit --skip-golden
